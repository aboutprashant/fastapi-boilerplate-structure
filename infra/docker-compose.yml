services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ai_platform
      POSTGRES_PASSWORD: ai_platform
      POSTGRES_DB: ai_platform
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_platform -d ai_platform"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-platform

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-platform

  knowledge-base:
    build:
      context: ..
      dockerfile: services/knowledge-base/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://ai_platform:ai_platform@postgres:5432/ai_platform
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: local-secret
      ENVIRONMENT: local
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ai-platform

  report-generator:
    build:
      context: ..
      dockerfile: services/report-generator/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://ai_platform:ai_platform@postgres:5432/ai_platform
      REDIS_URL: redis://redis:6379/1
      JWT_SECRET: local-secret
      ENVIRONMENT: local
    ports:
      - "8002:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ai-platform

  data-analytics:
    build:
      context: ..
      dockerfile: services/data-analytics/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://ai_platform:ai_platform@postgres:5432/ai_platform
      JWT_SECRET: local-secret
      ENVIRONMENT: local
    ports:
      - "8003:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ai-platform

  assistant-gateway:
    build:
      context: ..
      dockerfile: services/assistant-gateway/Dockerfile
    environment:
      JWT_SECRET: local-secret
      ENVIRONMENT: local
      KNOWLEDGE_BASE_URL: http://knowledge-base:8000
      DATA_ANALYTICS_URL: http://data-analytics:8000
    ports:
      - "8004:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      knowledge-base:
        condition: service_healthy
      data-analytics:
        condition: service_healthy
    networks:
      - ai-platform

networks:
  ai-platform:
    name: ai-platform
